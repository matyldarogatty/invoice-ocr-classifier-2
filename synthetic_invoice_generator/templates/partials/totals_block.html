<section class="totals-section">
  <table class="totals-table">
    <tr>
      <td class="totals-label">{{ c.net }}</td>
      <td class="totals-val">{{ d.net }}</td>
    </tr>
    <tr>
      <td class="totals-label">{{ c.vat }}</td>
      <td class="totals-val">{{ d.vat }}</td>
    </tr>
    <tr class="totals-strong">
      <td class="totals-label">{{ c.gross }}</td>
      <td class="totals-val">{{ d.gross }} {{ d.currency }}</td>
    </tr>
  </table>
</section>
